<!DOCTYPE html>
<html>
<head>

<title>Edit Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Edit Student</h2>

<form method="POST">

<div class="mb-3">
<label>Name</label>
<input name="name" value="{{student[1]}}" class="form-control">
</div>

<div class="mb-3">
<label>Birth Year</label>
<input name="birth_year" value="{{student[2]}}" class="form-control">
</div>

<div class="mb-3">
<label>Major</label>
<input name="major" value="{{student[3]}}" class="form-control">
</div>

<div class="mb-3">
<label>GPA</label>
<input name="gpa" value="{{student[4]}}" class="form-control">
</div>

<div class="mb-3">

<label>Class</label>

<select name="class_id" class="form-control">

{% for c in classes %}

<option value="{{c[0]}}" 
{% if c[0] == student[5] %}selected{% endif %}>

{{c[1]}}

</option>

{% endfor %}

</select>

</div>

<button class="btn btn-primary">Update</button>

<a href="/" class="btn btn-secondary">Back</a>

</form>

</div>

</body>
</html>
