<!DOCTYPE html>
<html>
<head>

<title>Edit Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Edit Student</h2>

<form method="POST">

<div class="mb-3">
<label class="form-label">Name</label>
<input name="name" value="{{student[1]}}" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Birth Year</label>
<input name="birth_year" value="{{student[2]}}" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Major</label>
<input name="major" value="{{student[3]}}" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">GPA</label>
<input name="gpa" value="{{student[4]}}" class="form-control">
</div>

<button class="btn btn-primary">Update</button>

<a href="/" class="btn btn-secondary">Back</a>

</form>

</div>

</body>
</html>
