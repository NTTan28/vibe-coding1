<!DOCTYPE html>
<html>
<head>

<title>Student Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Student Management System</h2>

<a href="/add" class="btn btn-primary mb-3">Add Student</a>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Major</th>
<th>GPA</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for s in students %}

<tr>

<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[3]}}</td>
<td>{{s[4]}}</td>

<td>

<a href="/edit/{{s[0]}}" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete/{{s[0]}}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
